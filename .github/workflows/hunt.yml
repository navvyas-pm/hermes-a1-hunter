name: hermes-a1-hunt

# Multi-region Always Free Ampere A1 capacity hunter.
#
# Each run sweeps several OCI regions in rapid succession using DIRECT compute
# launch (oci compute instance launch) — no Resource Manager stack, so every
# region is fully independent (a stack holds one shared Terraform state and is
# unsuitable for parallel multi-region hunting). The first region with capacity
# wins: it gets a public IP, opens a GitHub issue with the ssh line, and
# disables this workflow's schedule.
#
# Regions are tried sequentially (not as a parallel matrix) on purpose: the
# Always Free allowance is 4 OCPU / 24 GB *total* per tenancy, so we must never
# risk landing two instances at once. The concurrency group below also prevents
# two runs overlapping. cron (*/5) is a backstop; each run self-re-dispatches
# for continuous coverage.

on:
  schedule:
    - cron: '*/5 * * * *'      # backstop; runs self-chain between these
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  actions: write              # disable schedule on success / re-dispatch self

concurrency:
  group: a1-hunt
  cancel-in-progress: false   # never two hunts at once (avoids a double-launch)

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: us-sanjose-1          # default; every call overrides via --region
      TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      SUPPRESS_LABEL_WARNING: "True"
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      # Home region only — this is a pure Always Free account, where A1 can only
      # be created in the tenancy's home region. Space-separated if you add more.
      REGIONS: "us-sanjose-1"
      SHAPE: "VM.Standard.A1.Flex"
      OCPUS: "4"
      MEM_GB: "24"
      SWEEPS: "3"        # full region sweeps before re-dispatching
      GAP: "8"           # seconds between launch attempts (rate-limit friendly)
    steps:
      - name: Install OCI CLI
        run: |
          python3 -m pip install --quiet --user oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Hunt for A1 capacity across regions
        run: |
          set -uo pipefail

          # --- Already have a running instance anywhere we hunt? Then stop. ---
          already_running() {
            local r id
            for r in $REGIONS; do
              id=$(oci compute instance list --compartment-id "$TENANCY" --region "$r" \
                    --lifecycle-state RUNNING --query 'data[0].id' --raw-output 2>/dev/null || true)
              if [ -n "${id:-}" ] && [ "$id" != "null" ]; then echo "$r $id"; return 0; fi
            done
            return 1
          }

          # --- Ensure a public subnet exists in $1; echo its OCID (creates VCN/IG/RT/SL/subnet if absent). ---
          ensure_subnet() {
            local r="$1" vcn ig rt sl sn
            vcn=$(oci network vcn list --compartment-id "$TENANCY" --region "$r" \
                   --display-name hermes-vcn --query 'data[0].id' --raw-output 2>/dev/null || true)
            if [ -z "${vcn:-}" ] || [ "$vcn" = "null" ]; then
              vcn=$(oci network vcn create --compartment-id "$TENANCY" --region "$r" \
                     --display-name hermes-vcn --cidr-blocks '["10.0.0.0/16"]' \
                     --wait-for-state AVAILABLE --query 'data.id' --raw-output) || return 1
              ig=$(oci network internet-gateway create --compartment-id "$TENANCY" --region "$r" \
                     --vcn-id "$vcn" --is-enabled true --display-name hermes-ig \
                     --wait-for-state AVAILABLE --query 'data.id' --raw-output) || return 1
              rt=$(oci network route-table create --compartment-id "$TENANCY" --region "$r" \
                     --vcn-id "$vcn" --display-name hermes-rt \
                     --route-rules "[{\"destination\":\"0.0.0.0/0\",\"networkEntityId\":\"$ig\"}]" \
                     --wait-for-state AVAILABLE --query 'data.id' --raw-output) || return 1
              sl=$(oci network security-list create --compartment-id "$TENANCY" --region "$r" \
                     --vcn-id "$vcn" --display-name hermes-sl \
                     --egress-security-rules '[{"destination":"0.0.0.0/0","protocol":"all","isStateless":false}]' \
                     --ingress-security-rules '[{"source":"0.0.0.0/0","protocol":"6","isStateless":false,"tcpOptions":{"destinationPortRange":{"min":22,"max":22}}}]' \
                     --query 'data.id' --raw-output) || return 1
              sn=$(oci network subnet create --compartment-id "$TENANCY" --region "$r" \
                     --vcn-id "$vcn" --display-name hermes-subnet --cidr-block 10.0.0.0/24 \
                     --route-table-id "$rt" --security-list-ids "[\"$sl\"]" \
                     --wait-for-state AVAILABLE --query 'data.id' --raw-output) || return 1
              echo "$sn"; return 0
            fi
            sn=$(oci network subnet list --compartment-id "$TENANCY" --region "$r" --vcn-id "$vcn" \
                  --display-name hermes-subnet --query 'data[0].id' --raw-output 2>/dev/null || true)
            [ -n "${sn:-}" ] && [ "$sn" != "null" ] && echo "$sn"
          }

          # --- Latest Canonical Ubuntu 22.04 aarch64 image OCID for region $1. ---
          latest_image() {
            oci compute image list --compartment-id "$TENANCY" --region "$1" \
              --operating-system "Canonical Ubuntu" --operating-system-version "22.04" \
              --shape "$SHAPE" --sort-by TIMECREATED --sort-order DESC \
              --query 'data[0].id' --raw-output 2>/dev/null || true
          }

          # --- On success: ensure a public IP, open the issue, disable the schedule. ---
          finish() {
            local r="$1" inst="$2" vnic priv ip
            vnic=$(oci compute instance list-vnics --region "$r" --instance-id "$inst" \
                     --query 'data[0].id' --raw-output)
            ip=$(oci compute instance list-vnics --region "$r" --instance-id "$inst" \
                   --query 'data[0]."public-ip"' --raw-output 2>/dev/null || true)
            if [ -z "${ip:-}" ] || [ "$ip" = "null" ]; then
              priv=$(oci network private-ip list --region "$r" --vnic-id "$vnic" \
                       --query 'data[0].id' --raw-output)
              ip=$(oci network public-ip create --region "$r" --compartment-id "$TENANCY" \
                     --lifetime EPHEMERAL --private-ip-id "$priv" \
                     --query 'data."ip-address"' --raw-output 2>/dev/null || true)
            fi
            echo "INSTANCE READY region=$r ip=$ip instance=$inst"
            gh issue create -R "$REPO" --title "✅ Hermes VPS is up — $ip ($r)" \
              --body "Always Free A1 capacity landed in **$r**.  SSH: \`ssh ubuntu@$ip\`  •  instance: \`$inst\`" || true
            gh workflow disable hunt.yml -R "$REPO" || true
          }

          # --- Try every availability domain in region $1; return 0 on a RUNNING instance. ---
          launch_region() {
            local r="$1" subnet image ads ad inst out
            subnet=$(ensure_subnet "$r")
            if [ -z "${subnet:-}" ]; then echo "  [$r] no subnet (network setup failed)"; return 1; fi
            image=$(latest_image "$r")
            if [ -z "${image:-}" ] || [ "$image" = "null" ]; then echo "  [$r] no A1 image found"; return 1; fi

            ads=$(oci iam availability-domain list --region "$r" --query 'data[].name' 2>/dev/null \
                    | jq -r '.[]' 2>/dev/null || true)
            [ -z "${ads:-}" ] && { echo "  [$r] could not list availability domains"; return 1; }

            for ad in $ads; do
              echo "  [$r/$ad] launching A1 ${OCPUS} OCPU / ${MEM_GB} GB ..."
              inst=$(oci compute instance launch --region "$r" --compartment-id "$TENANCY" \
                       --availability-domain "$ad" --shape "$SHAPE" \
                       --shape-config "{\"ocpus\":$OCPUS,\"memoryInGBs\":$MEM_GB}" \
                       --image-id "$image" --subnet-id "$subnet" --assign-public-ip true \
                       --metadata file:///tmp/meta.json --display-name hermes-vps \
                       --wait-for-state RUNNING --max-wait-seconds 300 --wait-interval-seconds 15 \
                       --query 'data.id' --raw-output 2>/tmp/err) || inst=""
              out=$(cat /tmp/err 2>/dev/null || true)

              if [ -n "${inst:-}" ] && printf '%s' "$inst" | grep -q 'ocid1.instance'; then
                echo "  [$r/$ad] RUNNING $inst"
                finish "$r" "$inst"
                return 0
              fi
              if printf '%s' "$out" | grep -qiE 'out of host capacity|out of capacity'; then
                echo "  [$r/$ad] out-of-capacity"
              elif printf '%s' "$out" | grep -qiE 'LimitExceeded|ServiceLimitExceeded|quota'; then
                echo "  [$r/$ad] quota/limit reached — skipping region: $(printf '%s' "$out" | tail -1)"
                return 1
              else
                echo "  [$r/$ad] attempt failed: $(printf '%s' "$out" | tail -2)"
              fi
              sleep "$GAP"
            done
            return 1
          }

          # ---------------------------------------------------------------------

          hit=$(already_running || true)
          if [ -n "${hit:-}" ]; then
            echo "Instance already RUNNING ($hit); disabling schedule."
            gh workflow disable hunt.yml -R "$REPO" || true
            exit 0
          fi

          if [ -z "${SSH_PUBLIC_KEY:-}" ]; then
            echo "::error::SSH_PUBLIC_KEY secret is empty. Add it (repo → Settings → Secrets) so the VPS is reachable."
            exit 1
          fi
          # Write SSH key into instance metadata via a file (robust quoting).
          printf '{"ssh_authorized_keys": %s}' "$(jq -Rs . <<<"$SSH_PUBLIC_KEY")" > /tmp/meta.json

          for sweep in $(seq 1 "$SWEEPS"); do
            echo "::group::Sweep $sweep/$SWEEPS"
            for r in $REGIONS; do
              echo "Region $r:"
              if launch_region "$r"; then echo "::endgroup::"; exit 0; fi
            done
            echo "::endgroup::"
          done

          echo "No capacity after $SWEEPS sweeps across [$REGIONS]; re-dispatching for continuous coverage."
          gh workflow run hunt.yml -R "$REPO" || true
